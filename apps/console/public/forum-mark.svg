<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="FORUM mark">
  <title>FORUM</title>
  <!-- Aura: faint outer ring (auranode brand halo) -->
  <circle cx="16" cy="16" r="14.5" stroke="oklch(78% 0.14 85)" stroke-opacity="0.18" stroke-width="1"/>
  <!-- Circle: bone-white mid ring (the agora marketplace, Circle infra) -->
  <circle cx="16" cy="16" r="9.5" stroke="oklch(94% 0.005 80)" stroke-width="1.25"/>
  <!-- Arc: gold open-top arc (Arc Network, the open-air agora) -->
  <path d="M 7 11 A 9.5 9.5 0 1 1 25 11" stroke="oklch(78% 0.14 85)" stroke-width="2" stroke-linecap="round"/>
  <!-- Forum point: center dot — the gathering -->
  <circle cx="16" cy="16" r="1.6" fill="oklch(78% 0.14 85)"/>
</svg>
