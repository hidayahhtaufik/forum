name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only one review at a time per PR — cancel in-flight runs when a new push lands.
concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts to save spend; humans flip ready-for-review when they want feedback.
    if: github.event.pull_request.draft == false
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history back to the merge-base so we can diff base...HEAD.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root deps only
        # We don't need the full workspace — the reviewer only uses tsx + the
        # Anthropic SDK + zod, all hoisted to root.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Claude reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm tsx scripts/claude-pr-review.ts
